# Cloudflare Worker config for telemetry.subarr.com.
#
# This worker receives anonymous install-heartbeat pings from
# self-hosted subarr installations, stores them in D1 (Cloudflare's
# SQLite), and serves aggregated read-only stats endpoints that feed
# subarr.com/stats and the in-product Settings panel.
#
# Privacy posture is enforced at the schema level: forbidden fields
# from src/subarr/telemetry.py's regression test never have columns
# to land in. If something fingerprintable arrives in the payload,
# it gets silently dropped on insert.

name = "subarr-telemetry"
main = "src/worker.js"
compatibility_date = "2026-01-01"

# Custom domain — set up after first deploy in the Cloudflare dashboard:
#   Workers & Pages → subarr-telemetry → Settings → Triggers → Custom Domains
# Add `telemetry.subarr.com`. The DNS record gets created automatically
# if subarr.com is on Cloudflare. If hosted elsewhere, add a CNAME to
# subarr-telemetry.coaxk.workers.dev.
# routes = [
#   { pattern = "telemetry.subarr.com", custom_domain = true }
# ]

[[d1_databases]]
binding = "DB"
database_name = "subarr-telemetry"
# database_id gets filled in by `wrangler d1 create subarr-telemetry`.
# Stub here so the file parses; real value lives in .dev.vars (gitignored)
# or as a CI secret. Run `wrangler d1 create subarr-telemetry` once, then
# paste the returned UUID below before first deploy.
database_id = "a852f2e1-cbda-487d-8d92-83fb614d7a9c"

# Per-IP edge rate limiter (H1: the per-install_id throttle below is keyed on
# an attacker-CHOSEN value, so rotating install_id defeats it — enabling
# install-count poisoning + unbounded D1 writes). This native binding throttles
# on CF-Connecting-IP entirely at the edge and NEVER persists the IP, so it
# adds no fingerprintable storage. Legit telemetry is ~1 ping/day/install; even
# a multi-install household behind one NAT won't approach 30/min.
[[ratelimits]]
name = "PING_LIMITER"
namespace_id = "1001"
simple = { limit = 30, period = 60 }   # period must be 10 or 60

[vars]
# Soft caps. The worker rejects pings that arrive faster than this from
# a single install_id. Daily-cadence telemetry from subarr sends once
# per 24h; flooding suggests a bug we want to surface back to the user.
MIN_INTERVAL_S = "3600"          # 1 hour minimum between pings per install
FLOOD_THRESHOLD_S = "60"         # below this, set flood_detected=true in 429
MAX_PAYLOAD_BYTES = "8192"       # 8KB hard cap. v1.0 payload is ~1KB.

# CORS for the stats endpoints. subarr.com is the public dashboard host.
ALLOWED_ORIGINS = "https://subarr.com,https://www.subarr.com,https://stats.subarr.com,https://subarr-stats.pages.dev"
