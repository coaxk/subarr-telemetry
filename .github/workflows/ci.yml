name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: vitest + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm test

  deploy:
    name: deploy to cloudflare
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      # Migrations BEFORE deploy: new worker code referencing a new column
      # must never go live ahead of its schema (the 2026-06 crashes_json
      # deploy briefly 500'd every ping for exactly this reason). Tracked in
      # d1_migrations, so re-runs are no-ops.
      - name: apply D1 migrations
        run: npx wrangler d1 migrations apply subarr-telemetry --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
